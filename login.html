<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

onclick="login()">

</button>

<p id="error"></p>

</div>

<script src="login.js"></script>

</body>

</html>
