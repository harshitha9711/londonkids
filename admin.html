<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="admin-header">

<div>
<h1>London Kids Admin</h1>
<p>School Management Dashboard</p>
</div>

</div>

<section>

<button
class="logout"

onclick="logout()">

Logout

</button>
<div class="stats-box">

  <div class="admin-stat-card">
    <h2 id="totalAdmissions">0</h2>
    <p>Admissions</p>
  </div>

  <div class="admin-stat-card">
    <h2 id="totalImages">0</h2>
    <p>Gallery Images</p>
  </div>

</div>

<div class="admin-box">


<hr>

<h2>Admissions Management</h2>
<input
  type="text"
  id="searchAdmission"
  class="search-box"
  placeholder="🔍 Search Student, Parent or Phone"
  onkeyup="loadAdmissions()"
>
<div class="table-wrapper">

<table id="admissionsTable">
  <thead>
    <tr>
      <th>ID</th>
      <th>Parent</th>
      <th>Student</th>
      <th>Age</th>
      <th>Class</th>
      <th>Phone</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody>

  </tbody>
</table>
</div>

<div class="upload-box">

<input
type="file"
id="galleryUpload"
accept="image/png,image/jpeg,image/jpg,image/webp">

<button
onclick="addImage()">

Upload 📤

</button>



</div>
<h2>Gallery Management</h2>
<div id="adminGallery">

</div>

</div>

</section>

<script src="admin.js"></script>

</body>

</html>
