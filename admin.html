<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="admin-header">

<div>
<h1>London Kids Admin</h1>
<p>School Management Dashboard</p>
</div>

<button
class="logout"
onclick="logout()">
Logout
</button>

</div>

<section>

<h1 class="title">
Admin Dashboard
</h1>
<button
class="logout"

onclick="logout()">

Logout

</button>
<div class="stats-box">

  <div class="card">
    <h2 id="totalAdmissions">0</h2>
    <p>Admissions</p>
  </div>

  <div class="card">
    <h2 id="totalImages">4</h2>
    <p>Gallery Images</p>
  </div>

</div>

<div class="admin-box">

<h2>
Gallery Management
</h2>

<hr>

<h2>Admissions Management</h2>
<input
  type="text"
  id="searchAdmission"
  class="search-box"
  placeholder="🔍 Search Student, Parent or Phone"
  onkeyup="loadAdmissions()"
>
<table id="admissionsTable" border="1" width="100%">
  <thead>
    <tr>
      <th>ID</th>
      <th>Parent</th>
      <th>Student</th>
      <th>Age</th>
      <th>Class</th>
      <th>Phone</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody>

  </tbody>
</table>


<div class="upload-row">

<input
type="file"
id="galleryUpload"
>

<button
onclick="addImage()">

Upload 📤

</button>

</div>

<div id="adminGallery">

</div>

</div>

</section>

<script src="admin.js"></script>

</body>

</html>
